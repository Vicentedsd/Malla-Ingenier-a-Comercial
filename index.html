        FG: "from-zinc-100 via-zinc-200 to-zinc-300 text-zinc-900",
        OPT: "from-sky-300 via-cyan-300 to-blue-300 text-slate-900",
        EAA_OPT: "from-indigo-200 via-blue-200 to-indigo-300 text-slate-900",
        EAE_OPT: "from-emerald-200 via-teal-200 to-green-300 text-slate-900",
        MIX: "from-purple-200 via-pink-200 to-rose-200 text-slate-900",
        IC: "from-lime-300 via-green-400 to-emerald-500 text-white",
        ETI: "from-red-300 via-rose-400 to-pink-400 text-white",
      };

      const backgrounds = {
        light: "bg-gradient-to-br from-slate-100 via-white to-slate-200 text-slate-900",
        dark: "bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 text-slate-100",
      };

      const defaultState = {
        track: "common",
        completed: [],
        inProgress: [],
        theme: "light"
      };

      const [state, setState] = useState(defaultState);
      const [search, setSearch] = useState("");
      const [selectedId, setSelectedId] = useState(null);
      const [showAvailableOnly, setShowAvailableOnly] = useState(false);
      const [showModal, setShowModal] = useState(false);
      const [recentUnlocks, setRecentUnlocks] = useState([]);
      const [showLegend, setShowLegend] = useState(false);

      useEffect(() => {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (raw) setState({ ...defaultState, ...JSON.parse(raw) });
        } catch (e) {}
      }, []);

      useEffect(() => {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        } catch (e) {}
      }, [state]);

      const visibleCourses = useMemo(() => {
        return courses.filter((course) =>
          state.track === "common"
            ? course.track === "common"
            : course.track === "common" || course.track === state.track
        );
      }, [state.track]);

      const courseMap = useMemo(
        () => Object.fromEntries(courses.map((c) => [c.id, c])),
        []
      );

      const completedSet = new Set(state.completed);
      const inProgressSet = new Set(state.inProgress);

      const econElectiveGateSatisfied = ["EAE3101", "EAE3102", "EAE350B"].some(
        (id) => completedSet.has(id) || inProgressSet.has(id)
      );

      const isRequirementMet = (reqId) =>
        reqId === "ECON_ELECTIVE_GATE"
          ? econElectiveGateSatisfied
          : completedSet.has(reqId);

      const isCoreqMet = (reqId, currentId) =>
        reqId === "ECON_ELECTIVE_GATE"
          ? econElectiveGateSatisfied
          : completedSet.has(reqId) || inProgressSet.has(reqId) || reqId === currentId;

      const getStatus = (course) => {
        if (completedSet.has(course.id)) return "completed";
        if (inProgressSet.has(course.id)) return "in_progress";

        const prereqsMet = course.prereqs.every(isRequirementMet);
        const coreqsMet = course.coreqs.every((r) => isCoreqMet(r, course.id));

        return prereqsMet && coreqsMet ? "available" : "locked";
      };

      const grouped = useMemo(() => {
        return Array.from({ length: 10 }, (_, i) => i + 1).map((semester) => {
          const semesterCourses = visibleCourses.filter(
            (course) => course.semester === semester
          );

          const filtered = semesterCourses.filter((course) => {
            const text = `${course.code} ${course.name}`.toLowerCase();
            const matchesSearch = text.includes(search.toLowerCase());
            const matchesAvailable = showAvailableOnly
              ? getStatus(course) === "available"
              : true;

            return matchesSearch && matchesAvailable;
          });

          return { semester, courses: filtered };
        });
      }, [visibleCourses, search, showAvailableOnly, state]);

      const selected = selectedId ? courseMap[selectedId] : null;

      const getDependents = (courseId) =>
        visibleCourses.filter(
          (c) => c.prereqs.includes(courseId) || c.coreqs.includes(courseId)
        );

      const getCourseStateAfterChange = (baseState, courseId, mode) => {
        const completed = new Set(baseState.completed);
        const inProgress = new Set(baseState.inProgress);

        if (mode === "completed") {
          if (completed.has(courseId)) completed.delete(courseId);
          else {
            completed.add(courseId);
            inProgress.delete(courseId);
          }
        }

        if (mode === "progress") {
          if (inProgress.has(courseId)) inProgress.delete(courseId);
          else {
            inProgress.add(courseId);
            completed.delete(courseId);
          }
        }

        return {
          ...baseState,
          completed: Array.from(completed),
          inProgress: Array.from(inProgress)
        };
      };

      const markChange = (courseId, mode) => {
        const previousAvailable = new Set(
          visibleCourses
            .filter((c) => getStatus(c) === "available")
            .map((c) => c.id)
        );

        const nextState = getCourseStateAfterChange(state, courseId, mode);
        setState(nextState);

        setTimeout(() => {
          const nextCompletedSet = new Set(nextState.completed);
          const nextInProgressSet = new Set(nextState.inProgress);
          const nextGate = ["EAE3101", "EAE3102", "EAE350B"].some(
            (id) => nextCompletedSet.has(id) || nextInProgressSet.has(id)
          );

          const nextAvailable = visibleCourses.filter((course) => {
            if (nextCompletedSet.has(course.id) || nextInProgressSet.has(course.id)) return false;

            const prereqsMet = course.prereqs.every((r) =>
              r === "ECON_ELECTIVE_GATE" ? nextGate : nextCompletedSet.has(r)
            );

            const coreqsMet = course.coreqs.every((r) =>
              r === "ECON_ELECTIVE_GATE"
                ? nextGate
                : nextCompletedSet.has(r) || nextInProgressSet.has(r) || r === course.id
            );

            return prereqsMet && coreqsMet;
          });

          const unlocked = nextAvailable
            .filter((c) => !previousAvailable.has(c.id))
            .map((c) => c.name)
            .slice(0, 3);

          if (unlocked.length) {
            setRecentUnlocks(unlocked);
            setTimeout(() => setRecentUnlocks([]), 2600);
          }
        }, 60);
      };

      const resetProgress = () =>
        setState((prev) => ({ ...prev, completed: [], inProgress: [] }));

      const exportProgress = () => {
        const data = JSON.stringify(state, null, 2);
        const blob = new Blob([data], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `progreso-malla-${state.track}.json`;
        a.click();
        URL.revokeObjectURL(url);

        .reduce((sum, c) => sum + c.credits, 0);
      const inProgressCredits = visibleCourses
        .filter((c) => inProgressSet.has(c.id))

              completed: group.courses

                .reduce((s, c) => s + c.credits, 0),

    function StatCard({ label, value, accent = "text-slate-900", small = false, theme }) {
      return (
        <div className={`rounded-3xl p-4 ring-1 ${theme === "dark" ? "bg-slate-950 ring-slate-800" : "bg-slate-50 ring-slate-200"}`}>
          <p className={`text-sm ${theme === "dark" ? "text-slate-400" : "text-slate-500"}`}>
            {label}
          </p>
          <p className={`mt-1 font-bold ${small ? "text-xl" : "text-3xl"} ${accent}`}>
            {value}
          </p>
        </div>
      );
    }

    function SidePanel({
      selected,
      courseMap,
      state,
      typeStyles,
      getDependents,
      completedSet,
      inProgressSet,
      markChange,
      semesterTitle,
      theme,
      badgeByStatus,
      labelByStatus,
      getStatus
    }) {
      if (!selected) {
        return (
          <div className={`rounded-[2rem] p-5 shadow-sm ring-1 ${theme === "dark" ? "bg-slate-900 ring-slate-800" : "bg-white ring-slate-200"}`}>
            <h3 className={`text-lg font-bold ${theme === "dark" ? "text-white" : "text-slate-900"}`}>
              Panel rápido
            </h3>
            <p className={`mt-4 text-sm ${theme === "dark" ? "text-slate-400" : "text-slate-500"}`}>
              Aprieta cualquier ramo y se abrirá aquí un resumen rápido. También se abrirá un panel grande encima para que puedas marcarlo sin estar moviéndote tanto por la malla.
            </p>
          </div>
        );
      }

      return (
        <div className={`rounded-[2rem] p-5 shadow-sm ring-1 ${theme === "dark" ? "bg-slate-900 ring-slate-800" : "bg-white ring-slate-200"}`}>
          <div className={`rounded-[1.5rem] bg-gradient-to-r p-4 ${typeStyles[selected.type] || "from-slate-300 to-slate-400 text-slate-900"}`}>
            <p className="text-xs uppercase tracking-[0.2em] opacity-80">
              {selected.code}
            </p>
            <p className="mt-1 text-xl font-bold leading-tight">
              {selected.name}
            </p>
            <p className="mt-2 text-sm opacity-90">
              {selected.credits} créditos · {semesterTitle(selected.semester)}
            </p>
          </div>

          <p className={`mt-4 text-sm leading-7 ${theme === "dark" ? "text-slate-300" : "text-slate-600"}`}>
            {selected.description}
          </p>

          <div className="mt-5 grid gap-3">
            <button
              onClick={() => markChange(selected.id, "completed")}
              className="rounded-2xl bg-slate-900 px-4 py-3 font-semibold text-white transition hover:opacity-90"
            >
              {completedSet.has(selected.id) ? "Quitar aprobado" : "Marcar aprobado"}
            </button>

            <button
              onClick={() => markChange(selected.id, "progress")}
              className="rounded-2xl bg-amber-100 px-4 py-3 font-semibold text-amber-800 transition hover:bg-amber-200"
            >
              {inProgressSet.has(selected.id) ? "Quitar en curso" : "Marcar en curso"}
            </button>
          </div>

          <div className="mt-5 space-y-4">
            <div>
              <p className={`text-sm font-bold ${theme === "dark" ? "text-white" : "text-slate-900"}`}>
                Prerrequisitos
              </p>
              <div className="mt-2 flex flex-wrap gap-2">
                {selected.prereqs.length ? (
                  selected.prereqs.map((id) => (
                    <span key={id} className="rounded-full bg-rose-50 px-3 py-1 text-sm text-rose-700">
                      {id}
                    </span>
                  ))
                ) : (
                  <span className={`${theme === "dark" ? "text-slate-400" : "text-slate-500"}`}>
                    No tiene.
                  </span>
                )}
              </div>
            </div>

            <div>
              <p className={`text-sm font-bold ${theme === "dark" ? "text-white" : "text-slate-900"}`}>
                Correquisitos
              </p>
              <div className="mt-2 flex flex-wrap gap-2">
                {selected.coreqs.length ? (
                  selected.coreqs.map((id) => (
                    <span key={id} className="rounded-full bg-amber-50 px-3 py-1 text-sm text-amber-700">
                      {id === "ECON_ELECTIVE_GATE" ? "electivo econométrico" : id}
                    </span>
                  ))
                ) : (
                  <span className={`${theme === "dark" ? "text-slate-400" : "text-slate-500"}`}>
                    No tiene.
                  </span>
                )}
              </div>
            </div>

            <div>
              <p className={`text-sm font-bold ${theme === "dark" ? "text-white" : "text-slate-900"}`}>
                Desbloquea
              </p>
              <div className="mt-2 flex flex-wrap gap-2">
                {getDependents(selected.id).length ? (
                  getDependents(selected.id).map((course) => (
                    <span
                      key={course.id}
                      className={`rounded-full px-3 py-1 text-sm ${theme === "dark" ? "bg-slate-800 text-slate-200" : "bg-slate-100 text-slate-700"}`}
                    >
                      {course.code}
                    </span>
                  ))
                ) : (
                  <span className={`${theme === "dark" ? "text-slate-400" : "text-slate-500"}`}>
                    No desbloquea otros ramos directos.
                  </span>
                )}
              </div>
            </div>

            <div>
              <p className={`text-sm font-bold ${theme === "dark" ? "text-white" : "text-slate-900"}`}>
                Estado
              </p>
              <div className="mt-2">
                <span className={`rounded-full px-3 py-1 text-sm font-semibold ${badgeByStatus[getStatus(selected)]}`}>
                  {labelByStatus[getStatus(selected)]}
                </span>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(
      <MallaInteractivaIngenieriaComercialFinal />
    );
  </script>
</body>
</html>
