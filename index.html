      }, [state]);

      const currentTheme = palette[state.theme];
      const completedSet = new Set(state.completed);
      const inProgressSet = new Set(state.inProgress);

      const visibleCourses = useMemo(() => {
        return courses.filter((course) =>
          state.track === "common"
            ? course.track === "common"
            : course.track === "common" || course.track === state.track
        );
      }, [state.track]);

      const courseMap = useMemo(
        () => Object.fromEntries(courses.map((c) => [c.id, c])),
        []
      );

      const econElectiveGateSatisfied = ["EAE3101", "EAE3102", "EAE350B"].some(
        (id) => completedSet.has(id) || inProgressSet.has(id)
      );

      const isRequirementMet = (reqId) =>
        reqId === "ECON_ELECTIVE_GATE"
          ? econElectiveGateSatisfied
          : completedSet.has(reqId);

      const isCoreqMet = (reqId, currentId) =>
        reqId === "ECON_ELECTIVE_GATE"
          ? econElectiveGateSatisfied
          : completedSet.has(reqId) || inProgressSet.has(reqId) || reqId === currentId;

      const getStatus = (course) => {
        if (completedSet.has(course.id)) return "completed";
        if (inProgressSet.has(course.id)) return "in_progress";

        const prereqsMet = course.prereqs.every(isRequirementMet);
        const coreqsMet = course.coreqs.every((r) => isCoreqMet(r, course.id));

        return prereqsMet && coreqsMet ? "available" : "locked";
      };

      const grouped = useMemo(() => {
        return Array.from({ length: 10 }, (_, i) => i + 1).map((semester) => {
          const semesterCourses = visibleCourses.filter(
            (course) => course.semester === semester
          );

          const filtered = semesterCourses.filter((course) => {
            const text = `${course.code} ${course.name}`.toLowerCase();
            const matchesSearch = text.includes(search.toLowerCase());
            const matchesAvailable = showAvailableOnly
              ? getStatus(course) === "available"
              : true;

            return matchesSearch && matchesAvailable;
          });

          return { semester, courses: filtered };
        });
      }, [visibleCourses, search, showAvailableOnly, state]);

      const selected = selectedId ? courseMap[selectedId] : null;

      const getDependents = (courseId) =>
        visibleCourses.filter(
          (c) => c.prereqs.includes(courseId) || c.coreqs.includes(courseId)
        );

      const getNextState = (baseState, courseId, mode) => {
        const completed = new Set(baseState.completed);
        const inProgress = new Set(baseState.inProgress);

        if (mode === "completed") {
          if (completed.has(courseId)) completed.delete(courseId);
          else {
            completed.add(courseId);
            inProgress.delete(courseId);
          }
        }

        if (mode === "progress") {
          if (inProgress.has(courseId)) inProgress.delete(courseId);
          else {
            inProgress.add(courseId);
            completed.delete(courseId);
          }
        }

        return {
          ...baseState,
          completed: Array.from(completed),
          inProgress: Array.from(inProgress),
        };
      };

      const markChange = (courseId, mode) => {
        const previouslyAvailable = new Set(
          visibleCourses.filter((c) => getStatus(c) === "available").map((c) => c.id)
        );

        const nextState = getNextState(state, courseId, mode);
        setState(nextState);

        setTimeout(() => {
          const nextCompleted = new Set(nextState.completed);
          const nextInProgress = new Set(nextState.inProgress);
          const nextGate = ["EAE3101", "EAE3102", "EAE350B"].some(
            (id) => nextCompleted.has(id) || nextInProgress.has(id)
          );

          const unlocked = visibleCourses
            .filter((course) => {
              if (nextCompleted.has(course.id) || nextInProgress.has(course.id)) return false;

              const prereqsMet = course.prereqs.every((r) =>
                r === "ECON_ELECTIVE_GATE" ? nextGate : nextCompleted.has(r)
              );

              const coreqsMet = course.coreqs.every((r) =>
                r === "ECON_ELECTIVE_GATE"
                  ? nextGate
                  : nextCompleted.has(r) || nextInProgress.has(r) || r === course.id
              );

              return prereqsMet && coreqsMet;
            })
            .filter((course) => !previouslyAvailable.has(course.id))
            .map((course) => course.name)
            .slice(0, 4);

          if (unlocked.length) {
            setRecentUnlocks(unlocked);
            setTimeout(() => setRecentUnlocks([]), 2600);
          }
        }, 80);
      };

      const resetProgress = () => {
        setState((prev) => ({
          ...prev,
          completed: [],
          inProgress: []

      };

      const exportProgressPDF = () => {

        const doc = new jsPDF();
        let y = 18;

        const mentionLabel =
          state.track === "common"
            ? "Tronco común"
            : state.track === "econ"
            ? "Mención Economía"
            : "Mención Administración";

        doc.setFont("helvetica", "bold");
        doc.setFontSize(18);
        doc.text("Progreso Malla Ingeniería Comercial UC", 14, y);
        y += 10;

        doc.setFont("helvetica", "normal");
        doc.setFontSize(11);
        doc.text(`Vista actual: ${mentionLabel}`, 14, y);
        y += 7;
        doc.text(`Créditos aprobados: ${completedCredits}`, 14, y);
        y += 7;
        doc.text(`Créditos en curso: ${inProgressCredits}`, 14, y);
        y += 7;
        doc.text(`Créditos totales: ${totalCredits}`, 14, y);
        y += 7;
        doc.text(`Avance: ${percent}%`, 14, y);
        y += 12;

        grouped
          .filter((group) => (state.track === "common" ? group.semester <= 8 : true))

            if (y > 260) {
              doc.addPage();
              y = 18;
            }

            doc.setFont("helvetica", "bold");
            doc.text(semesterTitle(group.semester), 14, y);
            y += 6;

            doc.setFont("helvetica", "normal");
            const semesterCourses = visibleCourses.filter(c => c.semester === group.semester);
            semesterCourses.forEach((course) => {

                : inProgressSet.has(course.id)

              const lines = doc.splitTextToSize(line, 180);
              doc.text(lines, 18, y);
              y += lines.length * 5 + 1;

              if (y > 270) {
                doc.addPage();
                y = 18;
              }
            });

            y += 4;

                      <span className="rounded-full bg-emerald-100 px-3 py-1 text-emerald-800">EAE Economía</span>
                      <span className="rounded-full bg-amber-100 px-3 py-1 text-amber-800">MAT Matemáticas</span>
                      <span className="rounded-full bg-violet-100 px-3 py-1 text-violet-800">EAF Aplicadas / Prácticas</span>
                      <span className="rounded-full bg-rose-100 px-3 py-1 text-rose-800">FIL / ETI / TTF</span>
                      <span className="rounded-full bg-zinc-200 px-3 py-1 text-zinc-800">FG / Optativos</span>
                      <span className="rounded-full bg-rose-50 px-3 py-1 text-rose-700">Pre = prerrequisito</span>

                  </div>

            <div className="grid gap-6 xl:grid-cols-[1fr_440px]">

                <div className={`rounded-[2rem] p-4 shadow-sm ring-1 md:p-5 ${currentTheme.panel}`}>

                    <button

                    <button

                    <button

                  </div>
                </div>

                <div className={`scrollbar-soft overflow-x-auto rounded-[2rem] p-4 shadow-sm ring-1 md:p-5 ${currentTheme.panel}`}>
                  <div className={`grid min-w-[2400px] gap-4 ${state.track === "common" ? "grid-cols-8" : "grid-cols-10"}`}>
                    {grouped
                      .filter((group) => (state.track === "common" ? group.semester <= 8 : true))
                      .map((group) => (
                        <div

                          className={`rounded-[1.85rem] p-3 ring-1 ${currentTheme.board}`}
                        >
                          <div className="mb-3 flex items-center justify-between">
                            <div>
                              <h2 className={`text-lg font-bold ${currentTheme.text1}`}>
                                {semesterTitle(group.semester)}

                              <p className={`mt-1 text-xs ${currentTheme.text3}`}>
                                {semesterCredits[group.semester]?.completed || 0} / {semesterCredits[group.semester]?.total || 0} créditos aprobados · {semesterCredits[group.semester]?.inProgress || 0} en curso

                                  >

                          </div>
                        </div>
                      ))}
                  </div>

              <div className="space-y-4">

                          </button>

                          <button
                            onClick={() => markChange(selected.id, "progress")}
                            className="rounded-2xl bg-amber-100 px-4 py-3 font-semibold text-amber-800 transition hover:bg-amber-200"
                          >
                            {inProgressSet.has(selected.id)
                              ? "Quitar en curso"
                              : "Marcar en curso"}
                          </button>
                        </div>
                      </div>

                      <div className={`rounded-[1.5rem] p-5 ring-1 ${currentTheme.infoPanel}`}>
                        <h3 className={`text-lg font-bold ${currentTheme.text1}`}>
                          Estado actual
                        </h3>
                        <div className="mt-3 flex flex-wrap gap-2">
                          <span className={`rounded-full px-3 py-1 text-sm font-semibold ${badgeByStatus[getStatus(selected)]}`}>
                            {labelByStatus[getStatus(selected)]}
                          </span>
                        </div>
                      </div>

                      <div className={`rounded-[1.5rem] p-5 ring-1 ${currentTheme.infoPanel}`}>
                        <h3 className={`text-lg font-bold ${currentTheme.text1}`}>
                          Resumen
                        </h3>
                        <ul className={`mt-3 space-y-2 text-sm ${currentTheme.text2}`}>
                          <li>• Código: {selected.code}</li>
                          <li>• Créditos: {selected.credits}</li>
                          <li>• Semestre sugerido: {semesterTitle(selected.semester)}</li>
                          <li>• Área: {selected.track === "common" ? "Tronco común" : selected.track === "econ" ? "Economía" : "Administración"}</li>
                        </ul>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    function StatCard({ label, value, accent = "", currentTheme, small = false }) {
      return (
        <div className={`rounded-3xl p-4 ring-1 ${currentTheme.soft}`}>
          <p className={`text-sm ${currentTheme.text3}`}>{label}</p>
          <p className={`mt-1 font-bold ${small ? "text-xl" : "text-3xl"} ${accent || currentTheme.metricAccent}`}>
            {value}
          </p>
        </div>
      );
    }

    function SidePanel({
      selected,
      currentTheme,
      typeStyles,
      semesterTitle,
      completedSet,
      inProgressSet,
      markChange,
      badgeByStatus,
      labelByStatus,
      getStatus,
      onOpenModal
    }) {
      if (!selected) {
        return (
          <div className={`rounded-[2rem] p-5 shadow-sm ring-1 ${currentTheme.panel}`}>
            <h3 className={`text-lg font-bold ${currentTheme.text1}`}>Panel rápido</h3>
            <p className={`mt-4 text-sm ${currentTheme.text3}`}>
              Aprieta un ramo y aquí verás su ficha rápida. La descripción completa se ve solo en el panel grande.
            </p>
          </div>
        );
      }

      return (
        <div className={`rounded-[2rem] p-5 shadow-sm ring-1 ${currentTheme.panel}`}>
          <div className={`rounded-[1.5rem] bg-gradient-to-r p-4 ${typeStyles[selected.type] || "from-slate-300 to-slate-400 text-slate-900"}`}>
            <p className="text-xs uppercase tracking-[0.2em] opacity-80">{selected.code}</p>
            <p className="mt-1 text-2xl font-bold leading-tight">{selected.name}</p>
            <p className="mt-2 text-sm opacity-90">
              {selected.credits} créditos · {semesterTitle(selected.semester)}
            </p>
          </div>

          <div className="mt-5 grid gap-3">
            <button
              onClick={() => markChange(selected.id, "completed")}
              className="rounded-2xl bg-slate-900 px-4 py-3 font-semibold text-white transition hover:opacity-90"
            >
              {completedSet.has(selected.id) ? "Quitar aprobado" : "Marcar aprobado"}
            </button>

            <button
              onClick={() => markChange(selected.id, "progress")}
              className="rounded-2xl bg-amber-100 px-4 py-3 font-semibold text-amber-800 transition hover:bg-amber-200"
            >
              {inProgressSet.has(selected.id) ? "Quitar en curso" : "Marcar en curso"}
            </button>

            <button
              onClick={onOpenModal}
              className="rounded-2xl bg-fuchsia-600 px-4 py-3 font-semibold text-white transition hover:opacity-90"
            >
              Abrir panel grande
            </button>
          </div>

          <div className="mt-5 space-y-4">
            <div>
              <p className={`text-sm font-bold ${currentTheme.text1}`}>Estado</p>
              <div className="mt-2">
                <span className={`rounded-full px-3 py-1 text-sm font-semibold ${badgeByStatus[getStatus(selected)]}`}>
                  {labelByStatus[getStatus(selected)]}
                </span>
              </div>
            </div>

            <div>
              <p className={`text-sm font-bold ${currentTheme.text1}`}>Prerrequisitos</p>
              <div className="mt-2 flex flex-wrap gap-2">
                {selected.prereqs.length ? (
                  selected.prereqs.map((id) => (
                    <span key={id} className="rounded-full bg-rose-50 px-3 py-1 text-sm text-rose-700">
                      {id}
                    </span>
                  ))
                ) : (
                  <span className={currentTheme.text3}>No tiene.</span>
                )}
              </div>
            </div>

            <div>
              <p className={`text-sm font-bold ${currentTheme.text1}`}>Correquisitos</p>
              <div className="mt-2 flex flex-wrap gap-2">
                {selected.coreqs.length ? (
                  selected.coreqs.map((id) => (
                    <span key={id} className="rounded-full bg-amber-50 px-3 py-1 text-sm text-amber-700">
                      {id === "ECON_ELECTIVE_GATE" ? "electivo econométrico" : id}
                    </span>
                  ))
                ) : (
                  <span className={currentTheme.text3}>No tiene.</span>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    }

    function RelationBlock({
      title,
      items,
      courseMap,
      empty,
      chipClass,
      textClass,
      middleLabel,
      target,
      targetClass,
      specialEconometricGate = false
    }) {
      return (
        <div>
          <p className="text-sm font-bold text-slate-900">{title}</p>

          {items.length ? (
            <div className="mt-3 space-y-3">
              <div className="flex flex-wrap gap-2">
                {items.map((id) => {
                  const label =
                    specialEconometricGate && id === "ECON_ELECTIVE_GATE"
                      ? "Uno entre EAE3101 / EAE3102 / EAE350B"
                      : `${id}${courseMap[id] ? ` · ${courseMap[id].name}` : ""}`;

                  return (
                    <span key={id} className={`rounded-full px-3 py-1 text-sm ${chipClass}`}>
                      {label}
                    </span>
                  );
                })}
              </div>

              <div className={`text-xs font-medium ${textClass}`}>{middleLabel}</div>

              <div>
                <span className={`rounded-full px-3 py-1 text-sm ${targetClass}`}>
                  {target}
                </span>
              </div>
            </div>
          ) : (
            <p className={`mt-2 text-sm ${textClass}`}>{empty}</p>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(
      <MallaInteractivaIngenieriaComercialStartup />
    );
  </script>
</body>
</html>
