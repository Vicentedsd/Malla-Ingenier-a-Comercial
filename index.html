<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Malla Interactiva</title>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script src="https://cdn.tailwindcss.com"></script>
</head>

<body>

<div id="root"></div>

<script type="text/babel">

export default function MallaInteractiva() {
  const { useMemo, useState } = React;

  const semesters = [
    {
      title: "Semestre I",
      courses: [
        { code: "MAT1610", name: "Cálculo I", prereqs: [], credits: 10 },
        { code: "EAE1110", name: "Introducción a la Microeconomía", prereqs: [], credits: 10 },
        { code: "EAA1210", name: "Contabilidad", prereqs: [], credits: 10 },
        { code: "EAA1110", name: "Comportamiento Organizacional", prereqs: [], credits: 10 },
        { code: "VRA100C", name: "Examen de Comunicación Escrita", prereqs: [], credits: 0 },
        { code: "VRA2010", name: "English Placement Test ALTE 2", prereqs: [], credits: 0 },
      ],
    },
    {
      title: "Semestre II",
      courses: [
        { code: "MAT1279", name: "Introducción al Álgebra Lineal", prereqs: [], credits: 10 },
        { code: "MAT1620", name: "Cálculo II", prereqs: ["MAT1610"], credits: 10 },
        { code: "EAE1210", name: "Introducción a la Macroeconomía", prereqs: ["EAE1110"], credits: 10 },
        { code: "EAA1220", name: "Fundamentos de Marketing", prereqs: ["EAA1210"], credits: 10 },
        { code: "FIL2001", name: "Filosofía: ¿Para qué?", prereqs: [], credits: 10 },
        { code: "VRA3010", name: "English Test (Sufficiency ALTE 3)", prereqs: ["VRA2010"], credits: 0 },
      ],
    },
    {
      title: "Semestre III",
      courses: [
        { code: "EAA1510", name: "Probabilidad y Estadística", prereqs: ["MAT1279"], credits: 10 },
        { code: "EAF2010", name: "Aplicaciones Matemáticas para Economía y Negocios", prereqs: ["MAT1620", "MAT1279"], credits: 10 },
        { code: "EAA2410", name: "Análisis Económico: La Experiencia Chilena", prereqs: ["EAE1210"], credits: 10 },
        { code: "EAE1220", name: "Macroeconomía I", prereqs: ["EAE1210", "MAT1620"], credits: 10 },
        { code: "TTF", name: "Teológico", prereqs: [], credits: 10 },
      ],
    },
    {
      title: "Semestre IV",
      courses: [
        { code: "EAA1520", name: "Inferencia Estadística", prereqs: ["EAA1510"], credits: 10 },
        { code: "EAE2110", name: "Microeconomía I", prereqs: ["EAE1110", "EAF2010"], credits: 10 },
        { code: "EAE2210", name: "Macroeconomía II", prereqs: ["EAE1220", "EAF2010"], credits: 10 },
        { code: "EAA2310", name: "Fundamentos de Finanzas", prereqs: ["EAA1210", "EAA2410"], credits: 10 },
        { code: "FG-1", name: "Formación General", prereqs: [], credits: 10 },
      ],
    },
    {
      title: "Semestre V",
      courses: [
        { code: "IIC1103", name: "Introducción a la Programación", prereqs: ["EAA1520"], credits: 10 },
        { code: "EAE2120", name: "Microeconomía II", prereqs: ["EAE2110"], credits: 10 },
        { code: "EAA2210", name: "Estrategia de la Organización", prereqs: ["EAA1110", "EAA2310"], credits: 10 },
        { code: "EAA2220", name: "Teoría Financiera", prereqs: ["EAA2310"], credits: 5 },
        { code: "FG-2", name: "Formación General", prereqs: [], credits: 10 },
        { code: "FG-3", name: "Formación General", prereqs: [], credits: 10 },
      ],
    },
    {
      title: "Semestre VI",
      courses: [
        { code: "OP-MINOR-1", name: "Optativo de Profundización o Curso de Minor", prereqs: [], credits: 10 },
        { code: "EAE3210", name: "Estrategia Competitiva", prereqs: ["EAE2120", "EAE2210"], credits: 10 },
        { code: "EAA2230", name: "Contabilidad de Costos", prereqs: ["EAA2210", "EAA2220"], credits: 5 },
        { code: "MARKETING-ANALYTICS", name: "Marketing Analytics", prereqs: ["EAA1220", "EAA1510"], credits: 10 },
        { code: "EAA2240", name: "Ética, Economía y Empresa", prereqs: ["EAA2210"], credits: 10 },
        { code: "FG-4", name: "Formación General", prereqs: [], credits: 10 },
      ],
    },
    {
      title: "Semestre VII",
      courses: [
        { code: "OP-MINOR-2", name: "Optativo de Profundización o Curso de Minor", prereqs: [], credits: 10 },
        { code: "EAA2230-LEG", name: "Empresa y Legislación", prereqs: ["EAE2110", "IIC1103"], credits: 5 },
        { code: "EAA2420", name: "Contabilidad Gerencial", prereqs: ["EAA2230"], credits: 10 },
        { code: "EAA2110", name: "Dirección de Personas", prereqs: ["EAA1110", "EAA2240"], credits: 10 },
        { code: "FG-5", name: "Formación General", prereqs: [], credits: 10 },
        { code: "FG-6", name: "Formación General", prereqs: [], credits: 10 },
      ],
    },
    {
      title: "Semestre VIII",
      courses: [
        { code: "OP-MINOR-3", name: "Optativo de Profundización o Curso de Minor", prereqs: [], credits: 10 },
        { code: "OP-MINOR-4", name: "Optativo de Profundización o Curso de Minor", prereqs: [], credits: 10 },
        { code: "FG-MINOR", name: "Formación General usada como Optativo o Curso Minor", prereqs: [], credits: 10 },
        { code: "EAA2415", name: "Práctica Social", prereqs: ["EAA2110"], credits: 10 },
        { code: "EAA3401", name: "Dirección Financiera", prereqs: ["EAE2510", "EAA2420"], credits: 10 },
      ],
    },
    {
      title: "Semestre IX · Mención Administración",
      courses: [
        { code: "EAA3201", name: "Dirección de Empresas y Estrategia", prereqs: ["EAA2110", "EAA2240", "EAA3401", "EAA3201", "EAA2410", "EAE1220"], credits: 10 },
        { code: "EAA3501", name: "Creación de Nuevas Empresas", prereqs: ["EAA3401"], credits: 10 },
        { code: "EAA3101", name: "Liderazgo Estratégico", prereqs: ["EAA2110", "EAA3401"], credits: 5 },
        { code: "OP-ADM-1", name: "Optativo de Profundización", prereqs: [], credits: 10 },
        { code: "OP-ADM-2", name: "Optativo de Profundización", prereqs: [], credits: 10 },
      ],
    },
    {
      title: "Semestre X · Mención Administración",
      courses: [
        { code: "EAA3601", name: "Gestión de Operaciones", prereqs: ["EAE2510", "EAA2420", "EAE2130"], credits: 10 },
        { code: "EAA3500", name: "Práctica Profesional", prereqs: ["EAF2500", "EAA3601"], credits: 15 },
        { code: "OP-ADM-3", name: "Optativo de Profundización", prereqs: [], credits: 10 },
        { code: "OP-ADM-4", name: "Optativo de Profundización", prereqs: [], credits: 10 },
      ],
    },
  ];

  const [completed, setCompleted] = useState([]);
  const [search, setSearch] = useState("");
  const [selected, setSelected] = useState(null);
  const [showOnlyAvailable, setShowOnlyAvailable] = useState(false);

  const allCourses = useMemo(() => semesters.flatMap((s) => s.courses), []);

  const isUnlocked = (course) => course.prereqs.every((p) => completed.includes(p));

  const toggleCourse = (courseCode) => {
    setCompleted((prev) =>
      prev.includes(courseCode)
        ? prev.filter((c) => c !== courseCode)
        : [...prev, courseCode]
    );
  };

  const getDependents = (courseCode) => {
    return allCourses.filter((course) => course.prereqs.includes(courseCode));
  };

  const filteredSemesters = semesters.map((semester) => ({
    ...semester,
    courses: semester.courses.filter((course) => {
      const matchesSearch = `${course.code} ${course.name}`.toLowerCase().includes(search.toLowerCase());
      const matchesAvailability = showOnlyAvailable ? isUnlocked(course) && !completed.includes(course.code) : true;
      return matchesSearch && matchesAvailability;
    }),
  }));

  const completedCredits = allCourses
    .filter((c) => completed.includes(c.code))
    .reduce((sum, c) => sum + c.credits, 0);

  const totalCredits = allCourses.reduce((sum, c) => sum + c.credits, 0);
  const progress = Math.round((completedCredits / totalCredits) * 100) || 0;

  return (
    <div className="min-h-screen bg-slate-50 p-6">
      <div className="mx-auto max-w-7xl space-y-6">
        <div className="rounded-3xl bg-white p-6 shadow-sm">
          <h1 className="text-3xl font-bold text-slate-900">Malla interactiva · Ingeniería Comercial UC</h1>
          <p className="mt-2 text-sm text-slate-600">
            Basada en la malla de admisión 2024 y posteriores. Marca tus cursos aprobados y revisa prerrequisitos.
          </p>

          <div className="mt-5 grid gap-4 md:grid-cols-3">
            <div className="rounded-2xl bg-slate-100 p-4">
              <p className="text-sm text-slate-500">Créditos aprobados</p>
              <p className="mt-1 text-2xl font-semibold text-slate-900">{completedCredits}</p>
            </div>
            <div className="rounded-2xl bg-slate-100 p-4">
              <p className="text-sm text-slate-500">Créditos totales</p>
              <p className="mt-1 text-2xl font-semibold text-slate-900">{totalCredits}</p>
            </div>
            <div className="rounded-2xl bg-slate-100 p-4">
              <p className="text-sm text-slate-500">Avance</p>
              <p className="mt-1 text-2xl font-semibold text-slate-900">{progress}%</p>
            </div>
          </div>

          <div className="mt-5">
            <div className="h-3 w-full overflow-hidden rounded-full bg-slate-200">
              <div className="h-full rounded-full bg-slate-900 transition-all" style={{ width: `${progress}%` }} />
            </div>
          </div>

          <div className="mt-5 grid gap-3 md:grid-cols-[1fr_auto]">
            <input
              value={search}
              onChange={(e) => setSearch(e.target.value)}
              placeholder="Buscar ramo o código..."
              className="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:border-slate-400"
            />
            <button
              onClick={() => setShowOnlyAvailable((v) => !v)}
              className={`rounded-2xl px-4 py-3 font-medium transition ${showOnlyAvailable ? "bg-slate-900 text-white" : "bg-slate-100 text-slate-700"}`}
            >
              {showOnlyAvailable ? "Mostrando disponibles" : "Mostrar solo disponibles"}
            </button>
          </div>
        </div>

        <div className="grid gap-6 xl:grid-cols-[1fr_340px]">
          <div className="overflow-x-auto">
            <div className="grid min-w-[2500px] grid-cols-10 gap-4">
              {filteredSemesters.map((semester) => (
                <div key={semester.title} className="rounded-3xl bg-white p-4 shadow-sm">
                  <h2 className="mb-4 text-lg font-semibold text-slate-900">{semester.title}</h2>
                  <div className="space-y-3">
                    {semester.courses.length === 0 ? (
                      <div className="rounded-2xl border border-dashed border-slate-200 p-4 text-sm text-slate-400">Sin resultados</div>
                    ) : (
                      semester.courses.map((course) => {
                        const done = completed.includes(course.code);
                        const unlocked = isUnlocked(course);

                        return (
                          <button
                            key={course.code}
                            onClick={() => setSelected(course)}
                            className={`w-full rounded-2xl border p-4 text-left transition ${
                              done
                                ? "border-slate-900 bg-slate-900 text-white"
                                : unlocked
                                ? "border-slate-200 bg-slate-50 hover:border-slate-400"
                                : "border-slate-100 bg-slate-100 text-slate-400"
                            }`}
                          >
                            <div className="flex items-start justify-between gap-3">
                              <div>
                                <p className="text-xs font-medium uppercase tracking-wide opacity-70">{course.code}</p>
                                <p className="mt-1 font-semibold">{course.name}</p>
                                <p className={`mt-1 text-xs ${done ? "text-slate-200" : "text-slate-500"}`}>{course.credits} créditos</p>
                              </div>
                              <span className={`rounded-full px-2 py-1 text-xs font-medium ${done ? "bg-white/15 text-white" : unlocked ? "bg-slate-200 text-slate-700" : "bg-slate-200 text-slate-500"}`}>
                                {done ? "Aprobado" : unlocked ? "Disponible" : "Bloqueado"}
                              </span>
                            </div>
                          </button>
                        );
                      })
                    )}
                  </div>
                </div>
              ))}
            </div>
          </div>

          <div className="rounded-3xl bg-white p-5 shadow-sm">
            <h2 className="text-lg font-semibold text-slate-900">Detalle del ramo</h2>

            {selected ? (
              <div className="mt-4 space-y-4">
                <div>
                  <p className="text-xs font-medium uppercase tracking-wide text-slate-500">{selected.code}</p>
                  <p className="text-xl font-bold text-slate-900">{selected.name}</p>
                  <p className="mt-1 text-sm text-slate-500">{selected.credits} créditos</p>
                </div>

                <div>
                  <p className="text-sm font-semibold text-slate-700">Prerrequisitos</p>
                  {selected.prereqs.length ? (
                    <div className="mt-2 flex flex-wrap gap-2">
                      {selected.prereqs.map((p) => (
                        <span key={p} className="rounded-full bg-slate-100 px-3 py-1 text-sm text-slate-700">{p}</span>
                      ))}
                    </div>
                  ) : (
                    <p className="mt-2 text-sm text-slate-500">No tiene prerrequisitos.</p>
                  )}
                </div>

                <div>
                  <p className="text-sm font-semibold text-slate-700">Desbloquea</p>
                  {getDependents(selected.code).length ? (
                    <div className="mt-2 flex flex-wrap gap-2">
                      {getDependents(selected.code).map((d) => (
                        <span key={d.code} className="rounded-full bg-slate-100 px-3 py-1 text-sm text-slate-700">{d.code}</span>
                      ))}
                    </div>
                  ) : (
                    <p className="mt-2 text-sm text-slate-500">No desbloquea otros ramos directos.</p>
                  )}
                </div>

                <button
                  onClick={() => toggleCourse(selected.code)}
                  className="w-full rounded-2xl bg-slate-900 px-4 py-3 font-medium text-white transition hover:opacity-90"
                >
                  {completed.includes(selected.code) ? "Marcar como no aprobado" : "Marcar como aprobado"}
                </button>
              </div>
            ) : (
              <p className="mt-4 text-sm text-slate-500">Haz clic en un ramo para ver su información.</p>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}


</script>

</body>
</html>
