        { id: "EAA3601", code: "EAA3601", name: "Creación de Nuevas Empresas", credits: 10, semester: 10, track: "admin", type: "EAA", prereqs: ["EAA3401", "EAA3201", "EAA2420"], coreqs: [] },

        { id: "EAA3500", code: "EAA3500", name: "Práctica Profesional", credits: 15, semester: 10, track: "admin", type: "EAA", prereqs: ["EAF2500"], coreqs: ["EAA3601"] },
      ];

      const typeStyles = {
        EAA: "from-blue-500 to-indigo-500 text-white",
        EAE: "from-emerald-500 to-teal-500 text-white",
        EAF: "from-violet-500 to-fuchsia-500 text-white",
        MAT: "from-amber-400 to-orange-500 text-white",
        FIL: "from-rose-400 to-pink-500 text-white",
        TTF: "from-slate-600 to-slate-800 text-white",
        FG: "from-zinc-300 to-zinc-400 text-zinc-900",
        OPT: "from-cyan-300 to-sky-400 text-slate-900",
        EAA_OPT: "from-blue-200 to-indigo-200 text-slate-900",
        EAE_OPT: "from-emerald-200 to-teal-200 text-slate-900",
        MIX: "from-purple-200 to-pink-200 text-slate-900",
        IC: "from-lime-400 to-green-500 text-white",
        ETI: "from-red-400 to-rose-500 text-white",
      };

      const defaultState = {
        track: "common",
        completed: [],
        inProgress: [],
      };

      const [state, setState] = useState(defaultState);
      const [search, setSearch] = useState("");
      const [selectedId, setSelectedId] = useState(null);
      const [showAvailableOnly, setShowAvailableOnly] = useState(false);

      useEffect(() => {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (raw) {
            const parsed = JSON.parse(raw);
            setState({ ...defaultState, ...parsed });
          }
        } catch (e) {}
      }, []);

      useEffect(() => {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        } catch (e) {}
      }, [state]);

      const visibleTrack = state.track;

      const visibleCourses = useMemo(() => {
        return courses.filter((course) => {
          if (visibleTrack === "common") return course.track === "common";
          return course.track === "common" || course.track === visibleTrack;
        });
      }, [visibleTrack]);

      const courseMap = useMemo(() => Object.fromEntries(courses.map((c) => [c.id, c])), []);

      const completedSet = new Set(state.completed);
      const inProgressSet = new Set(state.inProgress);

      const econElectiveGateSatisfied = ["EAE3101", "EAE3102", "EAE350B"].some(
        (id) => completedSet.has(id) || inProgressSet.has(id)
      );

      const isRequirementMet = (reqId) => {
        if (reqId === "ECON_ELECTIVE_GATE") return econElectiveGateSatisfied;
        return completedSet.has(reqId);
      };

      const isCoreqMet = (reqId, currentId) => {
        if (reqId === "ECON_ELECTIVE_GATE") return econElectiveGateSatisfied;
        return completedSet.has(reqId) || inProgressSet.has(reqId) || reqId === currentId;
      };

      const getStatus = (course) => {
        if (completedSet.has(course.id)) return "completed";
        if (inProgressSet.has(course.id)) return "in_progress";

        const prereqsMet = course.prereqs.every(isRequirementMet);
        const coreqsMet = course.coreqs.every((r) => isCoreqMet(r, course.id));

        return prereqsMet && coreqsMet ? "available" : "locked";
      };

      const grouped = useMemo(() => {
        const semesters = Array.from({ length: 10 }, (_, i) => i + 1);
        return semesters.map((semester) => {
          const semesterCourses = visibleCourses.filter((course) => course.semester === semester);
          const filtered = semesterCourses.filter((course) => {
            const text = `${course.code} ${course.name}`.toLowerCase();
            const matchesSearch = text.includes(search.toLowerCase());
            const matchesAvailable = showAvailableOnly ? getStatus(course) === "available" : true;
            return matchesSearch && matchesAvailable;
          });
          return { semester, courses: filtered };
        });
      }, [visibleCourses, search, showAvailableOnly, state]);

      const selected = selectedId ? courseMap[selectedId] : null;

      const toggleCompleted = (courseId) => {
        setState((prev) => {
          const completed = new Set(prev.completed);
          const inProgress = new Set(prev.inProgress);
          if (completed.has(courseId)) {
            completed.delete(courseId);
          } else {
            completed.add(courseId);
            inProgress.delete(courseId);
          }
          return { ...prev, completed: Array.from(completed), inProgress: Array.from(inProgress) };
        });
      };

      const toggleInProgress = (courseId) => {
        setState((prev) => {
          const completed = new Set(prev.completed);
          const inProgress = new Set(prev.inProgress);
          if (inProgress.has(courseId)) {
            inProgress.delete(courseId);
          } else {
            inProgress.add(courseId);
            completed.delete(courseId);
          }
          return { ...prev, completed: Array.from(completed), inProgress: Array.from(inProgress) };
        });
      };

      const resetProgress = () => setState((prev) => ({ ...prev, completed: [], inProgress: [] }));

      const totalCredits = visibleCourses.reduce((sum, c) => sum + c.credits, 0);
      const completedCredits = visibleCourses

        .reduce((sum, c) => sum + c.credits, 0);
      const inProgressCredits = visibleCourses
        .filter((c) => inProgressSet.has(c.id))
        .reduce((sum, c) => sum + c.credits, 0);
      const percent = totalCredits ? Math.round((completedCredits / totalCredits) * 100) : 0;

      const getDependents = (courseId) =>
        visibleCourses.filter((c) => c.prereqs.includes(courseId) || c.coreqs.includes(courseId));

      const badgeByStatus = {
        completed: "bg-slate-900 text-white",
        in_progress: "bg-amber-100 text-amber-800",
        available: "bg-emerald-100 text-emerald-700",
        locked: "bg-slate-100 text-slate-500",
      };

      const labelByStatus = {
        completed: "Aprobado",
        in_progress: "En curso",
        available: "Disponible",
        locked: "Bloqueado",
      };

      const semesterTitle = (n) => {
        const roman = ["I", "II", "III", "IV", "V", "VI", "VII", "VIII", "IX", "X"];
        return `Semestre ${roman[n - 1]}`;
      };

          ? "Tronco común"
          : visibleTrack === "econ"
          ? "Mención Economía"
          : "Mención Administración";

                <div className="flex flex-col gap-4 lg:flex-row lg:items-end lg:justify-between">

                    <p className="text-sm uppercase tracking-[0.25em] text-slate-300">
                      Ingeniería Comercial UC
                    </p>
                    <h1 className="mt-2 text-3xl font-bold md:text-4xl">Malla interactiva</h1>
                    <p className="mt-2 max-w-3xl text-sm text-slate-300 md:text-base">
                      Con colores por escuela, prerrequisitos, correquisitos, progreso guardado automáticamente y cambio entre mención economía y administración.
                    </p>
                  </div>
                  <div className="rounded-2xl bg-white/10 px-4 py-3 backdrop-blur">
                    <p className="text-xs uppercase tracking-wide text-slate-300">Vista actual</p>
                    <p className="text-lg font-semibold">{mentionLabel}</p>
                  </div>
                </div>
              </div>

              <div className="grid gap-4 p-4 md:grid-cols-2 lg:grid-cols-5 md:p-6">
                <div className="rounded-3xl bg-slate-50 p-4 ring-1 ring-slate-200">
                  <p className="text-sm text-slate-500">Créditos aprobados</p>
                  <p className="mt-1 text-3xl font-bold text-slate-900">{completedCredits}</p>
                </div>
                <div className="rounded-3xl bg-slate-50 p-4 ring-1 ring-slate-200">
                  <p className="text-sm text-slate-500">Créditos en curso</p>
                  <p className="mt-1 text-3xl font-bold text-amber-600">{inProgressCredits}</p>
                </div>
                <div className="rounded-3xl bg-slate-50 p-4 ring-1 ring-slate-200">
                  <p className="text-sm text-slate-500">Créditos totales</p>
                  <p className="mt-1 text-3xl font-bold text-slate-900">{totalCredits}</p>
                </div>
                <div className="rounded-3xl bg-slate-50 p-4 ring-1 ring-slate-200">
                  <p className="text-sm text-slate-500">Avance</p>
                  <p className="mt-1 text-3xl font-bold text-emerald-600">{percent}%</p>
                </div>
                <div className="rounded-3xl bg-slate-50 p-4 ring-1 ring-slate-200">
                  <p className="text-sm text-slate-500">Ramos aprobados</p>
                  <p className="mt-1 text-3xl font-bold text-slate-900">{state.completed.length}</p>
                </div>
              </div>

              <div className="px-4 pb-6 md:px-6">
                <div className="h-4 overflow-hidden rounded-full bg-slate-200">
                  <div
                    className="h-full rounded-full bg-gradient-to-r from-emerald-500 via-teal-500 to-cyan-500 transition-all duration-700"
                    style={{ width: `${percent}%` }}
                  />
                </div>
              </div>
            </div>

            <div className="grid gap-6 xl:grid-cols-[1fr_360px]">
              <div className="space-y-4">
                <div className="rounded-[2rem] bg-white p-4 shadow-sm ring-1 ring-slate-200 md:p-5">

                      onChange={(e) => setSearch(e.target.value)}

                    <select
                      value={state.track}
                      onChange={(e) => setState((prev) => ({ ...prev, track: e.target.value }))}

                      <option value="common">Tronco común</option>
                      <option value="econ">Mención Economía</option>
                      <option value="admin">Mención Administración</option>
                    </select>

                    <button
                      onClick={() => setShowAvailableOnly((v) => !v)}
                      className={`rounded-2xl px-4 py-3 font-medium transition ${
                        showAvailableOnly ? "bg-slate-900 text-white" : "bg-slate-100 text-slate-700"
                      }`}
                    >
                      {showAvailableOnly ? "Solo disponibles" : "Ver todos"}
                    </button>

                    <button
                      onClick={resetProgress}
                      className="rounded-2xl bg-rose-50 px-4 py-3 font-medium text-rose-700 transition hover:bg-rose-100"
                    >
                      Reiniciar avance
                    </button>
                  </div>

                  <div className="mt-4 flex flex-wrap gap-2 text-xs font-medium">
                    <span className="rounded-full bg-blue-100 px-3 py-1 text-blue-800">EAA Administración</span>
                    <span className="rounded-full bg-emerald-100 px-3 py-1 text-emerald-800">EAE Economía</span>
                    <span className="rounded-full bg-amber-100 px-3 py-1 text-amber-800">MAT Matemáticas</span>
                    <span className="rounded-full bg-violet-100 px-3 py-1 text-violet-800">EAF Aplicadas / Prácticas</span>
                    <span className="rounded-full bg-rose-100 px-3 py-1 text-rose-800">FIL / ETI / TTF</span>
                    <span className="rounded-full bg-zinc-200 px-3 py-1 text-zinc-800">FG / Optativos</span>
                  </div>
                </div>

                <div className="overflow-x-auto rounded-[2rem] bg-white p-4 shadow-sm ring-1 ring-slate-200 md:p-5">
                  <div className={`grid min-w-[2200px] gap-4 ${state.track === "common" ? "grid-cols-8" : "grid-cols-10"}`}>
                    {grouped
                      .filter((group) => (state.track === "common" ? group.semester <= 8 : true))
                      .map((group) => (
                        <div key={group.semester} className="rounded-[1.75rem] bg-slate-50 p-3 ring-1 ring-slate-200">
                          <div className="mb-3 flex items-center justify-between">
                            <h2 className="text-base font-bold text-slate-900">{semesterTitle(group.semester)}</h2>
                            <span className="rounded-full bg-white px-2.5 py-1 text-xs font-medium text-slate-500 ring-1 ring-slate-200">
                              {group.courses.length} ramos
                            </span>
                          </div>

                          <div className="space-y-3">
                            {group.courses.length === 0 ? (
                              <div className="rounded-2xl border border-dashed border-slate-300 bg-white p-4 text-sm text-slate-400">
                                Sin resultados
                              </div>
                            ) : (
                              group.courses.map((course) => {
                                const status = getStatus(course);
                                const style = typeStyles[course.type] || "from-slate-300 to-slate-400 text-slate-900";
                                const isSelected = selectedId === course.id;
                                return (
                                  <button
                                    key={course.id}
                                    onClick={() => setSelectedId(course.id)}
                                    className={`w-full rounded-[1.5rem] border bg-white p-0 text-left shadow-sm transition duration-200 hover:-translate-y-0.5 hover:shadow-md ${
                                      isSelected ? "border-slate-900 ring-2 ring-slate-900/10" : "border-slate-200"
                                    }`}
                                  >
                                    <div className={`rounded-t-[1.5rem] bg-gradient-to-r px-4 py-3 ${style}`}>
                                      <div className="flex items-start justify-between gap-3">
                                        <div>
                                          <p className="text-[11px] font-semibold uppercase tracking-[0.18em] opacity-90">
                                            {course.code}
                                          </p>
                                          <p className="mt-1 text-sm font-bold leading-tight">{course.name}</p>
                                        </div>
                                        <span className="rounded-full bg-white/20 px-2 py-1 text-[11px] font-semibold backdrop-blur">
                                          {course.credits} cr
                                        </span>
                                      </div>
                                    </div>
                                    <div className="space-y-3 p-4">
                                      <div className="flex items-center justify-between">
                                        <span className={`rounded-full px-2.5 py-1 text-[11px] font-semibold ${badgeByStatus[status]}`}>
                                          {labelByStatus[status]}
                                        </span>
                                        <span className="text-[11px] font-medium text-slate-400">
                                          {course.track === "common" ? "común" : course.track}
                                        </span>
                                      </div>

                                      {(course.prereqs.length > 0 || course.coreqs.length > 0) && (
                                        <div className="space-y-2">
                                          {course.prereqs.length > 0 && (
                                            <div className="flex flex-wrap gap-1.5">
                                              {course.prereqs.map((req) => (
                                                <span key={req} className="rounded-full bg-rose-50 px-2 py-1 text-[11px] font-medium text-rose-700">
                                                  Pre: {req}
                                                </span>
                                              ))}
                                            </div>
                                          )}
                                          {course.coreqs.length > 0 && (
                                            <div className="flex flex-wrap gap-1.5">
                                              {course.coreqs.map((req) => (
                                                <span key={req} className="rounded-full bg-amber-50 px-2 py-1 text-[11px] font-medium text-amber-700">
                                                  Co: {req === "ECON_ELECTIVE_GATE" ? "electivo econométrico" : req}
                                                </span>
                                              ))}
                                            </div>
                                          )}
                                        </div>
                                      )}
                                    </div>
                                  </button>
                                );
                              })
                            )}
                          </div>
                        </div>
                      ))}
                  </div>
                </div>
              </div>

              <div className="space-y-4">
                <div className="rounded-[2rem] bg-white p-5 shadow-sm ring-1 ring-slate-200">
                  <h3 className="text-lg font-bold text-slate-900">Detalle del ramo</h3>
                  {selected ? (
                    <div className="mt-4 space-y-4">
                      <div className={`rounded-[1.5rem] bg-gradient-to-r p-4 ${typeStyles[selected.type] || "from-slate-300 to-slate-400 text-slate-900"}`}>
                        <p className="text-xs uppercase tracking-[0.2em] opacity-80">{selected.code}</p>
                        <p className="mt-1 text-xl font-bold leading-tight">{selected.name}</p>
                        <p className="mt-2 text-sm opacity-90">
                          {selected.credits} créditos · {semesterTitle(selected.semester)}
                        </p>
                      </div>

                      <div className="grid gap-3 sm:grid-cols-2">
                        <button
                          onClick={() => toggleCompleted(selected.id)}
                          className="rounded-2xl bg-slate-900 px-4 py-3 font-semibold text-white transition hover:opacity-90"
                        >
                          {completedSet.has(selected.id) ? "Quitar aprobado" : "Marcar aprobado"}
                        </button>
                        <button
                          onClick={() => toggleInProgress(selected.id)}
                          className="rounded-2xl bg-amber-100 px-4 py-3 font-semibold text-amber-800 transition hover:bg-amber-200"
                        >
                          {inProgressSet.has(selected.id) ? "Quitar en curso" : "Marcar en curso"}
                        </button>
                      </div>

                      <div>
                        <p className="text-sm font-bold text-slate-700">Prerrequisitos</p>
                        {selected.prereqs.length ? (
                          <div className="mt-2 flex flex-wrap gap-2">
                            {selected.prereqs.map((id) => (
                              <span key={id} className="rounded-full bg-rose-50 px-3 py-1 text-sm text-rose-700">
                                {id} {courseMap[id] ? `· ${courseMap[id].name}` : ""}
                              </span>
                            ))}
                          </div>
                        ) : (
                          <p className="mt-2 text-sm text-slate-500">No tiene.</p>
                        )}
                      </div>

                      <div>
                        <p className="text-sm font-bold text-slate-700">Correquisitos</p>
                        {selected.coreqs.length ? (
                          <div className="mt-2 flex flex-wrap gap-2">
                            {selected.coreqs.map((id) => (
                              <span key={id} className="rounded-full bg-amber-50 px-3 py-1 text-sm text-amber-700">
                                {id === "ECON_ELECTIVE_GATE"
                                  ? "Uno entre EAE3101 / EAE3102 / EAE350B"
                                  : `${id}${courseMap[id] ? ` · ${courseMap[id].name}` : ""}`}
                              </span>
                            ))}
                          </div>
                        ) : (
                          <p className="mt-2 text-sm text-slate-500">No tiene.</p>
                        )}
                      </div>

                      <div>
                        <p className="text-sm font-bold text-slate-700">Desbloquea</p>
                        {getDependents(selected.id).length ? (
                          <div className="mt-2 flex flex-wrap gap-2">
                            {getDependents(selected.id).map((course) => (
                              <span key={course.id} className="rounded-full bg-slate-100 px-3 py-1 text-sm text-slate-700">
                                {course.code} · {course.name}
                              </span>
                            ))}
                          </div>
                        ) : (
                          <p className="mt-2 text-sm text-slate-500">No desbloquea otros ramos directos.</p>
                        )}
                      </div>
                    </div>
                  ) : (
                    <p className="mt-4 text-sm text-slate-500">
                      Haz clic en un ramo para ver detalles, requisitos y acciones.
                    </p>
                  )}
                </div>

                <div className="rounded-[2rem] bg-white p-5 shadow-sm ring-1 ring-slate-200">
                  <h3 className="text-lg font-bold text-slate-900">Cómo leer la malla</h3>
                  <div className="mt-4 space-y-3 text-sm text-slate-600">
                    <p><span className="font-semibold text-slate-900">Prerrequisito:</span> debes aprobarlo antes.</p>
                    <p><span className="font-semibold text-slate-900">Correquisito:</span> lo puedes cursar al mismo tiempo.</p>
                    <p><span className="font-semibold text-slate-900">En curso:</span> sirve para correquisitos, pero no para prerrequisitos.</p>
                    <p><span className="font-semibold text-slate-900">Guardado automático:</span> tu avance queda almacenado en este navegador.</p>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<MallaInteractivaIngenieriaComercial />);
  </script>
</body>
</html>
